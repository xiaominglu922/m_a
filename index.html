<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>牛顿第二定律 - 合外力一定 加速度与质量成反比</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: "微软雅黑", system-ui, Roboto, sans-serif;
    }
    body {
      background: #ffffff;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .law-card {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      box-shadow: 0 10px 20px -8px rgba(0,20,40,0.2),inset 0 1px 2px rgba(255,255,255,0.8);
      padding: 24px 20px 28px 20px;
      width: 100%;
      max-width: 400px;
      border: 1px solid #e0e6f0;
    }
    .card-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin: 0 0 6px 0;
      color: #1e2b4f;
      text-align: center;
    }
    .sub-head {
      font-size: 1rem;
      color: #3a4c6b;
      margin: 0 0 16px 0;
      border-left: 3px solid #4f7aa6;
      padding-left: 14px;
      background: #eef3fa50;
      border-radius: 0 16px 16px 0;
      line-height: 1.4;
    }
    .canvas-wrapper {
      background: #f5f8fc;
      border-radius: 16px;
      padding: 14px 8px 8px 8px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.03);
      margin-bottom: 18px;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
      margin: 0 auto;
      cursor: pointer;
    }
    .control-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .slider-area {
      background: #f8fafc;
      border-radius: 20px;
      padding: 14px 16px;
      box-shadow: 0 2px 8px rgba(0,10,30,0.08);
    }
    .param-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .param-label {
      font-weight: 600;
      color: #1f3a5f;
      font-size: 1.1rem;
    }
    .param-value {
      background: #1f3a5f;
      color: white;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.95rem;
      font-weight: 500;
    }
    input[type=range] {
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, #3f6a9c, #7fa9d0);
      border-radius: 8px;
      -webkit-appearance: none;
      appearance: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 2px 6px #1f3a5f44;
      border: 2px solid #1f3a5f;
      cursor: grab;
      transition: 0.1s;
    }
    input[type=range]::-webkit-slider-thumb:hover {
      transform: scale(1.1);
      background: #ecf5ff;
    }
    .accel-indicator {
      background: #d7e6ff;
      border-radius: 20px;
      padding: 12px 16px;
      font-size: 1.25rem;
      font-weight: 600;
      color: #113355;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: inset 0 1px 3px #a0b8d450;
    }
    .accel-number {
      background: #1f3a5f;
      color: white;
      padding: 5px 18px;
      border-radius: 30px;
      font-family: 'Consolas', monospace;
      font-size: 1.35rem;
    }
    .analogy {
      font-size: 0.95rem;
      color: #2e4b74;
      background: #dde9f5;
      padding: 12px 18px;
      border-radius: 30px;
      box-shadow: inset 0 0 0 1px #ffffff, 0 2px 6px #00000008;
      text-align: center;
    }
    .footer-note {
      text-align: center;
      color: #4f6077;
      margin-top: 16px;
      font-size: 0.85rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="law-card">
    <div class="card-title">a ∝ 1/m （合外力F 一定）</div>
    <div class="sub-head">质量越大，加速度越小</div>
    <div class="canvas-wrapper">
      <canvas id="canvasMain" width="360" height="200"></canvas>
    </div>
    <div class="control-panel">
      <div class="slider-area">
        <div class="param-row">
          <span class="param-label">质量 m</span>
          <span class="param-value" id="massValue">2.0 kg</span>
        </div>
        <input type="range" id="massSlider" min="0.5" max="5.0" step="0.1" value="2.0">
        <div style="display: flex; justify-content: space-between; margin-top: 6px;">
          <span style="font-size: 0.8rem;">0.5 kg</span>
          <span style="font-size: 0.8rem;">5.0 kg</span>
        </div>
      </div>
      <div class="accel-indicator">
        <span>加速度 a</span>
        <span class="accel-number" id="accelNum">1.00 m/s²</span>
      </div>
      <div class="analogy">
        相同推力，质量越大的物体，加速越慢
      </div>
    </div>
    <div class="footer-note">
      拖动滑块观察质量的变化对加速度及运动的影响 | 点击画布重置物体位置
    </div>
  </div>

<script>
  (function() {
    const FORCE_FIXED = 2.0;
    const canvas = document.getElementById('canvasMain');
    const ctx = canvas.getContext('2d');
    const massSlider = document.getElementById('massSlider');
    const massSpan = document.getElementById('massValue');
    const accelSpan = document.getElementById('accelNum');

    let objState = { x: 30, v: 0 };
    const OBJ_WIDTH = 32;
    const OBJ_HEIGHT = 32;
    const LEFT_START = 28;
    const RIGHT_BOUND = 300;
    const SPEED_SCALE = 90;
    let currentMass = 2.0;

    function updateDisplay() {
      massSpan.innerText = currentMass.toFixed(1) + ' kg';
      const a = (FORCE_FIXED / currentMass).toFixed(2);
      accelSpan.innerText = a + ' m/s²';
    }

    massSlider.addEventListener('input', (e) => {
      currentMass = parseFloat(e.target.value);
      updateDisplay();
    });
    updateDisplay();

    function drawArrow(ctx, fromX, fromY, length, color, headSize = 9) {
      if (length < 2) return;
      const toX = fromX + length;
      const toY = fromY;
      ctx.beginPath();
      ctx.moveTo(fromX, fromY);
      ctx.lineTo(toX, toY);
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(toX, toY - headSize * 0.7);
      ctx.lineTo(toX + headSize, toY);
      ctx.lineTo(toX, toY + headSize * 0.7);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }

    function drawCanvas() {
      ctx.clearRect(0, 0, 360, 200);
      ctx.beginPath();
      ctx.strokeStyle = '#9bb6d0';
      ctx.lineWidth = 2;
      ctx.moveTo(10, 140);
      ctx.lineTo(350, 140);
      ctx.stroke();

      const y = 108;
      ctx.fillStyle = '#4f7aa6';
      ctx.shadowColor = '#a0b8cf';
      ctx.shadowBlur = 6;
      ctx.fillRect(objState.x, y, OBJ_WIDTH, OBJ_HEIGHT);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#1f3a5f';
      ctx.lineWidth = 2;
      ctx.strokeRect(objState.x, y, OBJ_WIDTH, OBJ_HEIGHT);

      ctx.font = 'bold 14px "微软雅黑", monospace';
      ctx.fillStyle = '#113355';
      ctx.fillText(`m = ${currentMass.toFixed(1)} kg`, objState.x - 5, y - 12);

      const a = FORCE_FIXED / currentMass;
      ctx.font = 'bold 14px "Consolas", monospace';
      ctx.fillStyle = '#b0004b';
      ctx.fillText(`a = ${a.toFixed(2)} m/s²`, objState.x + 2, y - 34);

      const arrowStartX = objState.x + OBJ_WIDTH;
      const arrowStartY = y + OBJ_HEIGHT / 2;
      const arrowLenFixed = 36;
      drawArrow(ctx, arrowStartX, arrowStartY, arrowLenFixed, '#2b6c8f', 9);

      ctx.font = 'bold 12px "微软雅黑"';
      ctx.fillStyle = '#1d5e8f';
      ctx.fillText(`F = ${FORCE_FIXED.toFixed(1)} N (固定)`, arrowStartX + 5, arrowStartY - 14);
    }

    let lastTimestamp = null;
    function animate(now) {
      if (!lastTimestamp) {
        lastTimestamp = now;
        requestAnimationFrame(animate);
        return;
      }
      let delta = (now - lastTimestamp) / 1000;
      if (delta > 0.1) delta = 0.05;
      lastTimestamp = now;

      const a = FORCE_FIXED / currentMass;
      objState.v += a * delta * SPEED_SCALE;
      if (objState.v < 0) objState.v = 0;
      objState.x += objState.v * delta;

      if (objState.x > RIGHT_BOUND) { objState.x = LEFT_START; objState.v = 0; }
      if (objState.x < LEFT_START) objState.x = LEFT_START;

      drawCanvas();
      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
    canvas.addEventListener('click', () => { objState.x = LEFT_START; objState.v = 0; });
  })();
</script>
</body>
</html>
